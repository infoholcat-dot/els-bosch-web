{% extends "base.html" %}
{% block title %}{% if p %}Editar{% else %}Nova obra{% endif %} · Els Bosch{% endblock %}
{% block content %}
<div class="admin-container">
  <h1>{% if p %}Editar: {{ p.title }}{% else %}Nova obra{% endif %}</h1>
  <form method="post" enctype="multipart/form-data" class="admin-form">
    <label>Títol *
      <input type="text" name="title" value="{{ p.title if p else '' }}" required />
    </label>
    <label>Any
      <input type="text" name="year" value="{{ p.year if p else '' }}" placeholder="ex: 1975" />
    </label>
    <label>Tècnica
      <input type="text" name="technique" value="{{ p.technique if p else '' }}" placeholder="ex: Oli sobre tela" />
    </label>
    <label>Dimensions
      <input type="text" name="dimensions" value="{{ p.dimensions if p else '' }}" placeholder="ex: 50×70 cm" />
    </label>
    <label>Descripció
      <textarea name="description" rows="5">{{ p.description if p else '' }}</textarea>
    </label>
    <label>Imatge
      {% if p and p.image_filename %}
      <img src="/static/images/{{ p.image_filename }}" style="max-height:150px;display:block;margin-bottom:0.5rem" />
      {% endif %}
      <input type="file" name="image" accept="image/*" />
    </label>
    <div class="admin-form-accions">
      <button type="submit" class="btn-primary">Desar</button>
      <a href="/admin">Cancel·lar</a>
    </div>
  </form>
</div>
{% endblock %}
