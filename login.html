<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedir · Els Bosch</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Els Bosch</a>
    <ul class="nav-links"></ul>
    <div class="nav-dreta"></div>
  </nav>

  <div class="login-container">
    <div class="login-box">
      <p class="etiqueta">Família Bosch</p>
      <h1>Accedir</h1>
      <p>Accés exclusiu per a membres de la família. Inicia sessió amb el teu compte de Google.</p>

      <div id="missatge-error" class="missatge-error" style="display:none;"></div>

      <button class="btn-google" onclick="loginGoogle()">
        <img src="https://www.google.com/favicon.ico" alt="Google" />
        Continuar amb Google
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>const supabaseJs = supabase; </script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Si ja ha iniciat sessió, redirigir
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    async function loginGoogle() {
      console.log('loginGoogle cridat');
      console.log('supabase:', typeof supabase, supabase);
      console.log('supabase.auth:', typeof supabase?.auth);
      try {
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/index.html' }
        });
        console.log('signInWithOAuth resultat:', data, error);
        if (error) {
          console.error('Error OAuth:', error);
          document.getElementById('missatge-error').style.display = 'block';
          document.getElementById('missatge-error').textContent = error.message;
        }
      } catch(e) {
        console.error('Excepció:', e);
      }
    }
  </script>
</body>
</html>
