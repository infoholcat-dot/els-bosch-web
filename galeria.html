<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Col·lecció Pilà Masó · Els Bosch</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Els Bosch</a>
    <ul class="nav-links">
      <li><a href="galeria.html" class="actiu">Col·lecció Pilà Masó</a></li>
      <li><a href="#">Història</a></li>
      <li><a href="#">Família</a></li>
    </ul>
    <div class="nav-dreta" id="nav-dreta"></div>
  </nav>

  <div class="galeria-cap">
    <div class="galeria-cap-top">
      <div>
        <h1>Col·lecció Pilà Masó</h1>
        <p class="subtitol">Pintures originals · 1940–2000</p>
      </div>
      <span class="galeria-recompte" id="recompte"></span>
    </div>

    <div class="filtres">
      <button class="filtre-btn actiu" data-filtre="tot">Totes les obres</button>
      <button class="filtre-btn" data-filtre="oli">Oli</button>
      <button class="filtre-btn" data-filtre="aquarella">Aquarel·la</button>
      <button class="filtre-btn" data-filtre="guaix">Guaix</button>
      <button class="filtre-btn" data-filtre="dibuix">Dibuix</button>
    </div>
  </div>

  <div class="galeria-cos">
    <div id="spinner" class="spinner"></div>
    <div class="galeria-grid" id="galeria-grid" style="display:none;"></div>
    <p class="buit" id="buit" style="display:none;">No hi ha obres en aquesta categoria.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>const supabaseJs = supabase; </script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/galeria.js"></script>
  <script>
    requirirLogin().then(ok => {
      if (!ok) return;
      inicialitzarNav();
      carregarGaleria();
    });

    document.querySelectorAll('.filtre-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('actiu'));
        btn.classList.add('actiu');
        filtrarGaleria(btn.dataset.filtre);
      });
    });
  </script>
</body>
</html>
